<section>
    <div *ngIf="!isLoading" class="flex mt-5">
        <div *ngFor="let book of books$ | async">
            <div class="relative flex flex-col items-center justify-center m-4 p-4 border rounded-lg shadow-md w-64">

                <div class="cursor-pointer justify-end" *ngIf="isAlreadyAddedMap.get(book.id)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-bookmark"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M18 7v14l-6 -4l-6 4v-14a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4" /></svg>
                </div>

                <img class="cursor-pointer"
                    [src]="book.volumeInfo.imageLinks?.thumbnail" 
                    [alt]="book.volumeInfo.title"
                    onerror="this.src='placeholder.jpg'">

                <h3 class="max-w-64 font-medium truncate text-center px-2 mt-5">{{ book.volumeInfo.title }}</h3>
                <p class="max-w-64 truncate text-center">{{ book.volumeInfo.authors.join(', ') }}</p>

                <div class="cursor-pointer" (click)="addBook(book.id)" *ngIf="!isAlreadyAddedMap.get(book.id)">
                     <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="icon icon-tabler icons-tabler-filled icon-tabler-copy-plus"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M18.333 6a3.667 3.667 0 0 1 3.667 3.667v8.666a3.667 3.667 0 0 1 -3.667 3.667h-8.666a3.667 3.667 0 0 1 -3.667 -3.667v-8.666a3.667 3.667 0 0 1 3.667 -3.667zm-4.333 4a1 1 0 0 0 -1 1v2h-2a1 1 0 0 0 -.993 .883l-.007 .117a1 1 0 0 0 1 1h2v2a1 1 0 0 0 .883 .993l.117 .007a1 1 0 0 0 1 -1v-2h2a1 1 0 0 0 .993 -.883l.007 -.117a1 1 0 0 0 -1 -1h-2v-2a1 1 0 0 0 -.883 -.993zm1 -8c1.094 0 1.828 .533 2.374 1.514a1 1 0 1 1 -1.748 .972c-.221 -.398 -.342 -.486 -.626 -.486h-10c-.548 0 -1 .452 -1 1v9.998c0 .32 .154 .618 .407 .805l.1 .065a1 1 0 1 1 -.99 1.738a3 3 0 0 1 -1.517 -2.606v-10c0 -1.652 1.348 -3 3 -3z" /></svg>
                </div>

                <div class="flex" *ngIf="isAlreadyAddedMap.get(book.id)">

                    <div (click)="deleteBook(book.id)" class="cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="icon icon-tabler icons-tabler-filled icon-tabler-square-minus"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M19 2a3 3 0 0 1 3 3v14a3 3 0 0 1 -3 3h-14a3 3 0 0 1 -3 -3v-14a3 3 0 0 1 3 -3zm-4 9h-6l-.117 .007a1 1 0 0 0 .117 1.993h6l.117 -.007a1 1 0 0 0 -.117 -1.993z" /></svg>
                    </div>

                    <app-drop-down-menu 
                        [itemGoogleId] = "book.id"
                        [itemGoogleName] = "book.volumeInfo.title"
                        (statusChanged)="onBookStatusChanged(book, $event)">
                    </app-drop-down-menu>

                </div>
            </div>
        </div>
    </div>
</section>
