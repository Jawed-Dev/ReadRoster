<div class="w-full flex justify-center" (click)="toggleMenu()">
    
    <div class="flex justify-end w-full cursor-pointer">
        <!-- <svg xmlns="http://www.w3.org/2000/svg"  width="24"  height="24"  viewBox="0 0 24 24"  fill="none"  stroke="currentColor"  stroke-width="2"  stroke-linecap="round"  stroke-linejoin="round"  class="icon icon-tabler icons-tabler-outline icon-tabler-dots"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M19 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /></svg> -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-pencil-cog"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" /><path d="M13.5 6.5l4 4" /><path d="M17.001 19a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" /><path d="M19.001 15.5v1.5" /><path d="M19.001 21v1.5" /><path d="M22.032 17.25l-1.299 .75" /><path d="M17.27 20l-1.3 .75" /><path d="M15.97 17.25l1.3 .75" /><path d="M20.733 20l1.3 .75" /></svg>
    </div>
    
    <div *ngIf="isMenuOpen" 
        class="absolute w-full right-0 bottom-[-110px] bg-white border border-gray-200 rounded-md shadow-lg"
        (click)="$event.stopPropagation()"
        clickOutside="closeMenu()">
        
        <div *ngFor="let status of bookStatus" 
            class="flex pl-[70px] items-center hover:bg-gray-200 cursor-pointer" 
            (click)="toggleStatus(status.id, $event)">
            <div class="flex items-center">
                <input type="checkbox" [checked]="status.checked" 
                (click)="toggleStatus(status.id, $event)"/>
                <p class="pl-5"> {{ status.label }} </p>
            </div>
        </div>
        
    </div>
</div>
